<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <style>
    /* Core colours */
    .ring {
      fill: none;
      stroke: #64ffda;
      stroke-width: 4;
    }

    .base {
      fill: #0a192f;
    }

    .letter {
      fill: #f8fafc;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: 54px;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    /* Optional: subtle hover-like adaptability (not required but safe) */
    @media (prefers-color-scheme: light) {
      .letter {
        fill: #ffffff;
      }
    }

  </style>

  <!-- Dark navy circle -->
  <circle class="base" cx="50" cy="50" r="44"></circle>

  <!-- Cyan ring border -->
  <circle class="ring" cx="50" cy="50" r="44"></circle>

  <!-- Center "A" -->
  <text class="letter" x="50" y="52">A</text>

</svg>